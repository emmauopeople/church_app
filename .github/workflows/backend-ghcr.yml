name: Backend GHCR Images

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - release
      - main
    paths:
      - apps/auth-service/**
      - apps/church-core-service/**
      - apps/document-service/**
      - package.json
      - package-lock.json
      - .github/workflows/backend-ghcr.yml
  pull_request:
    branches:
      - dev
      - release
      - main
    paths:
      - apps/auth-service/**
      - apps/church-core-service/**
      - apps/document-service/**
      - package.json
      - package-lock.json
      - .github/workflows/backend-ghcr.yml

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            image: church-app-auth-service
            dockerfile: apps/auth-service/Dockerfile
          - service: church-core-service
            image: church-app-church-core-service
            dockerfile: apps/church-core-service/Dockerfile
          - service: document-service
            image: church-app-document-service
            dockerfile: apps/document-service/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
