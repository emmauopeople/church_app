name: Build and Push Images to ECR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ecr-build-push-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "302530480617"
  AWS_ROLE_ARN: arn:aws:iam::302530480617:role/k8s-microservice-cms-github-actions

jobs:
  build-and-push:
    name: Build and push ${{ matrix.service.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: auth-service
            context: apps/auth-service
            dockerfile: apps/auth-service/Dockerfile
            ecr_repository: church-auth-service

          - name: church-core-service
            context: apps/church-core-service
            dockerfile: apps/church-core-service/Dockerfile
            ecr_repository: church-core-service

          - name: document-core-service
            context: apps/document-core-service
            dockerfile: apps/document-core-service/Dockerfile
            ecr_repository: church-document-core-service

          - name: frontend
            context: apps/frontend
            dockerfile: apps/frontend/Dockerfile
            ecr_repository: church-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker build context
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d "${{ matrix.service.context }}" ]; then
            echo "Missing build context: ${{ matrix.service.context }}"
            echo "Update the workflow matrix if the service path is different."
            exit 1
          fi

          if [ ! -f "${{ matrix.service.dockerfile }}" ]; then
            echo "Missing Dockerfile: ${{ matrix.service.dockerfile }}"
            echo "Add a Dockerfile for this service before building the production image."
            exit 1
          fi

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: image
        shell: bash
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::7}"
          ECR_REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          ECR_REPOSITORY="${{ matrix.service.ecr_repository }}"

          echo "repository_uri=${ECR_REGISTRY}/${ECR_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "prod_tag=prod-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image to Amazon ECR
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.image.outputs.repository_uri }}:${{ steps.image.outputs.prod_tag }}
            ${{ steps.image.outputs.repository_uri }}:${{ steps.image.outputs.sha_tag }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

      - name: Image summary
        shell: bash
        run: |
          echo "### Image pushed to ECR" >> "$GITHUB_STEP_SUMMARY"
          echo "Service: ${{ matrix.service.name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Repository: ${{ steps.image.outputs.repository_uri }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Tags:" >> "$GITHUB_STEP_SUMMARY"
          echo "- ${{ steps.image.outputs.prod_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- ${{ steps.image.outputs.sha_tag }}" >> "$GITHUB_STEP_SUMMARY"

# Next phase:
# - update GitOps/Helm image tags in the platform repo
# - let Argo CD deploy to EKS
# - add rollout/rollback strategy after the EKS platform is ready
