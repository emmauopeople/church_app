name: Feature to Dev Build

on:
  pull_request:
    branches:
      - dev
    paths:
      - apps/**
      - package.json
      - package-lock.json

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - church-core-service
          - document-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=${{ matrix.service }}
