name: Release to VPS Swarm

on:
  workflow_dispatch:
  push:
    branches:
      - release
    paths:
      - apps/auth-service/**
      - apps/church-core-service/**
      - apps/document-service/**
      - frontend/**
      - infra/swarm/**
      - package.json
      - package-lock.json
      - .github/workflows/release-to-vps-swarm.yml

permissions:
  contents: read
  packages: write

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            image: church-app-auth-service
            dockerfile: apps/auth-service/Dockerfile
          - service: church-core-service
            image: church-app-church-core-service
            dockerfile: apps/church-core-service/Dockerfile
          - service: document-service
            image: church-app-document-service
            dockerfile: apps/document-service/Dockerfile
          - service: frontend
            image: church-app-frontend
            dockerfile: frontend/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            VITE_AUTH_API_URL=https://api.gestionparoissiale.org
            VITE_CHURCH_CORE_API_URL=https://api.gestionparoissiale.org
            VITE_DOCUMENT_API_URL=https://api.gestionparoissiale.org
            VITE_DEFAULT_LANGUAGE=fr
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:release
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:sha-${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-push-deploy

    steps:
      - uses: actions/checkout@v4

      - name: Copy stack file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_SWARM_HOST }}
          username: ${{ secrets.VPS_SWARM_USER }}
          key: ${{ secrets.VPS_SWARM_KEY }}
          source: infra/swarm/church-app-stack.yml
          target: /home/ubuntu/swarmapp
          strip_components: 2

      - name: Deploy Docker Swarm stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_SWARM_HOST }}
          username: ${{ secrets.VPS_SWARM_USER }}
          key: ${{ secrets.VPS_SWARM_KEY }}
          script: |
            set -e
            cd /home/ubuntu/swarmapp
            echo "${{ secrets.GHCR_SWARM_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            export GHCR_OWNER=${{ github.repository_owner }}
            export IMAGE_TAG=sha-${{ github.sha }}
            docker pull ghcr.io/${{ github.repository_owner }}/church-app-auth-service:sha-${{ github.sha }}
            docker pull ghcr.io/${{ github.repository_owner }}/church-app-church-core-service:sha-${{ github.sha }}
            docker pull ghcr.io/${{ github.repository_owner }}/church-app-document-service:sha-${{ github.sha }}
            docker pull ghcr.io/${{ github.repository_owner }}/church-app-frontend:sha-${{ github.sha }}
            docker stack deploy --with-registry-auth -c church-app-stack.yml church-app
            docker service ls --filter label=com.docker.stack.namespace=church-app
